services:
  database:
    image: postgres:18
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=squad-aegis
      - POSTGRES_USER=squad-aegis
      - POSTGRES_DB=squad-aegis
    networks:
      - default

  valkey:
    image: valkey/valkey:9
    ports:
      - 6379:6379
    volumes:
      - valkey:/data
    networks:
      - default

  clickhouse-server:
    image: clickhouse/clickhouse-server:26.3
    ports:
      - 8123:8123
      - 9000:9000
    volumes:
      - clickhouse:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: "squad_aegis"
      CLICKHOUSE_PASSWORD: "squad_aegis"
    networks:
      - default

  clickhouse-ui:
    image: ghcr.io/caioricciuti/ch-ui:latest
    ports:
      - "5521:5521"
    environment:
      VITE_CLICKHOUSE_URL: "http://127.0.0.1:8123"
      VITE_CLICKHOUSE_USER: "squad_aegis"
      VITE_CLICKHOUSE_PASS: "squad_aegis"
    networks:
      - default

volumes:
  postgres:
  clickhouse:
  valkey:

networks:
  default:
    driver: bridge
